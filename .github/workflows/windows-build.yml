name: Build Windows Zip

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller

      - name: Validate examples
        run: |
          python src\daily_task\app.py --data daily_tasks.example.json --check

      - name: Build zip
        run: |
          .\scripts\build_windows.ps1 -Version "0.1.3-beta"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          .\scripts\build_installer.ps1 -Version "0.1.3-beta" -VersionInfo "0.1.3.0" -SkipAppBuild

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskTask-0.1.3-beta-win64
          path: |
            release\DeskTask-0.1.3-beta-win64.zip
            release\DeskTaskSetup-0.1.3-beta.exe
